name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run workspace tests
        run: cargo test --workspace

      - name: Build Warped Space Shooter example
        run: cargo run -- build examples/warped_space_shooter

  docs:
    name: Docs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            docs/package-lock.json
            tree-sitter-rpu/package-lock.json

      - name: Install Tree-sitter RPU dependencies
        working-directory: tree-sitter-rpu
        run: npm ci

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.100 --force

      - name: Build Warped Space Shooter web export
        run: cargo run -- build-web examples/warped_space_shooter

      - name: Copy web export into docs static assets
        run: |
          mkdir -p docs/static/play/warped-space-shooter
          cp -R examples/warped_space_shooter/build/web/. docs/static/play/warped-space-shooter/

      - name: Install docs dependencies
        working-directory: docs
        run: npm ci

      - name: Build docs site
        working-directory: docs
        run: npm run build
